on:
  workflow_call:
    inputs:
      directory:
        required: true
        type: string

jobs:
  build:
    runs-on: windows-2025
    steps:
    - name: Check out code
      uses: actions/checkout@v6
    - name: Setup Docker buildx
      uses: docker/setup-buildx-action@v4.0.0
      with:
        driver: docker
    - name: Build Images
      run: .\github-action.ps1 ${{ inputs.directory }} ${{ secrets.DOCKERHUB_USERNAME }} ${{ secrets.DOCKERHUB_TOKEN }}
      shell: pwsh
